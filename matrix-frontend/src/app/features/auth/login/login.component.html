<div
  class="min-h-screen bg-gradient-to-br from-indigo-900 to-slate-900 flex items-center justify-center px-4"
>
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-blue-600 mx-auto rounded-xl flex items-center justify-center mb-4">
        <span class="text-3xl font-bold">M</span>
      </div>
      <h1 class="text-4xl font-bold text-white mb-2">Bienvenido</h1>
      <p class="text-slate-400">Ingresa tus credenciales para continuar</p>
    </div>

    <!-- FORMULARIO -->
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
      @if (errorMessage()) {
        <div
          class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm text-center"
        >
          {{ errorMessage() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <!-- USUARIO -->
        <div class="mb-6">
          <label for="usuario" class="block text-sm font-medium text-slate-400 mb-2">Usuario</label>
          <input
            type="text"
            id="usuario"
            [(ngModel)]="usuario"
            name="usuario"
            placeholder="Ej. admin"
            class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            required
            [disabled]="isLoading()"
          />
        </div>

        <!-- PASSWORD -->
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-slate-400 mb-2"
            >Contraseña</label
          >
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            required
            [disabled]="isLoading()"
          />
        </div>

        <!-- Botón Submit -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          @if (isLoading()) {
            <div
              class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"
            ></div>
          } @else {
            <span>Iniciar Sesión</span>
          }
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8">
      <p class="text-sm text-slate-500">
        Usuario: <span class="text-slate-300">admin</span> | Contraseña:
        <span class="text-slate-300">admin123</span>
      </p>
    </div>
  </div>
</div>
