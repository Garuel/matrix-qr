<!doctype html>
<html>
  <head>
    <title>Matrix Processor</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f0f2f5;
      }
      textarea {
        width: 100%;
        height: 100px;
      }
      pre {
        background: #fff;
        padding: 10px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h2>Reto Matrices: Go + Node</h2>
    <p>Ingresa la matriz:</p>
    <textarea id="matrixInput">[[1, 2], [3, 4]]</textarea><br /><br />
    <button onclick="process()">Procesar Matriz</button>

    <h3>Resultado:</h3>
    <pre id="output">Los resultados aparecerán aquí...</pre>

    <script>
      async function process() {
        const input = document.getElementById("matrixInput").value;
        const output = document.getElementById("output");

        try {
          const response = await fetch(
            "http://localhost:3000/api/matrix/process",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ matrix: JSON.parse(input) }),
            },
          );
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          output.textContent = "Error: " + err.message;
        }
      }
    </script>
  </body>
</html>
